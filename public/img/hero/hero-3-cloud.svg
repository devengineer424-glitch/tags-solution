<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img">

  <defs>
    <radialGradient id="bg-c" cx="62%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#151d27"/>
      <stop offset="55%" stop-color="#0e141b"/>
      <stop offset="100%" stop-color="#090d12"/>
    </radialGradient>
    <pattern id="dots-c" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <radialGradient id="glow-c" cx="62%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .flow  { animation: flow 3.5s linear infinite; }
    .flow2 { animation: flow 6s linear infinite; }
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 90s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 120s linear infinite reverse; }
    .twinkle { animation: twinkle 4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 3s ease-out infinite; }
    .drift { animation: drift 7s ease-in-out infinite; }
    .blink { animation: blink 2.6s ease-in-out infinite; }
    .breathe { animation: breathe 5s ease-in-out infinite; }
    @keyframes flow    { to { stroke-dashoffset: -180; } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes twinkle { 0%,100% { opacity: .3; } 50% { opacity: .95; } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .7; } 100% { transform: scale(2.4); opacity: 0; } }
    @keyframes drift   { 0%,100% { transform: translateY(0); opacity: .18; } 50% { transform: translateY(-26px); opacity: .5; } }
    @keyframes blink   { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { opacity: .35; } 50% { opacity: .85; } }
    @media (prefers-reduced-motion: reduce) {
      .flow,.flow2,.spin,.spinR,.twinkle,.ping,.drift,.blink,.breathe { animation: none; }
    }
  </style>

  <rect width="1600" height="1000" fill="url(#bg-c)"/>
  <rect width="1600" height="1000" fill="url(#dots-c)"/>
  <rect width="1600" height="1000" fill="url(#glow-c)"/>
