<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" role="img">

  <style>
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 5s linear infinite reverse; }
    .flow  { animation: flow 1.6s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 3.4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes flow    { to { stroke-dashoffset: -32; } }
    @keyframes pulse   { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes blink   { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .spin,.spinR,.flow,.pulse,.breathe,.ping,.blink { animation: none; }
    }
  </style>
