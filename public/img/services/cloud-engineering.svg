<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" role="img">

  <style>
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 5s linear infinite reverse; }
    .flow  { animation: flow 1.6s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 3.4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    .scale { transform-box: fill-box; transform-origin: bottom; animation: scaleup 3.4s ease-in-out infinite; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes flow    { to { stroke-dashoffset: -32; } }
    @keyframes pulse   { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes blink   { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    @keyframes scaleup { 0%,100% { transform: scaleY(0.35); opacity: 0.4; } 50% { transform: scaleY(1); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .spin,.spinR,.flow,.pulse,.breathe,.ping,.blink,.scale { animation: none; opacity: 1; }
    }
  </style>
  <rect x="0" y="0" width="440" height="240" fill="#f6f8fa"/>

  <text x="220" y="38" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#f57c00">AUTO-SCALING CLOUD</text>

  <!-- cloud -->
  <g transform="translate(220,86)">
    <g class="breathe">
      <path d="M-58 16 a26 26 0 0 1 8 -50 a30 30 0 0 1 56 6 a22 22 0 0 1 4 44 Z" fill="#fff" stroke="#f57c00" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M-8 -8 v20 M-8 12 l-9 -8 M-8 12 l9 -8" fill="none" stroke="#f57c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,-4)"/>
    </g>
    <!-- uptime ping -->
    <g transform="translate(40,-26)"><circle r="6" fill="none" stroke="#f57c00" stroke-width="2" class="ping"/><circle r="3.6" fill="#f57c00"/></g>
  </g>

  <!-- CI/CD orbit ring around cloud -->
  <g transform="translate(220,86)"><g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 0 0" to="360 0 0" dur="7s" repeatCount="indefinite"/>
    <circle r="66" fill="none" stroke="#f57c00" stroke-opacity="0.35" stroke-width="1.4" stroke-dasharray="6 8"/>
    <path d="M66 0 l-8 -5 l1 10 z" fill="#f57c00"/>
  </g></g>

  <!-- distribution lines cloud -> instances -->
  <g stroke="#d6dce3" stroke-width="1.3">
    <line x1="220" y1="132" x2="120" y2="164"/>
    <line x1="220" y1="132" x2="180" y2="168"/>
    <line x1="220" y1="132" x2="260" y2="168"/>
    <line x1="220" y1="132" x2="320" y2="164"/>
  </g>
  <!-- deploy particles -->
  <g opacity="0"><rect x="-5" y="-4" width="10" height="8" rx="2" fill="#f57c00"/>
    <animateMotion dur="2s" begin="0s" repeatCount="indefinite" path="M220 132 L120 164" calcMode="linear"/>
    <animate attributeName="opacity" dur="2s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.14;0.8;1"/></g>
  <g opacity="0"><rect x="-5" y="-4" width="10" height="8" rx="2" fill="#f57c00"/>
    <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M220 132 L320 164" calcMode="linear"/>
    <animate attributeName="opacity" dur="2s" begin="1s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.14;0.8;1"/></g>

  <!-- scaling server instances -->
  <g>
    <g transform="translate(108,196)" class="scale" style="animation-delay:0s"><rect x="-14" y="-32" width="28" height="32" rx="4" fill="#fff" stroke="#f57c00" stroke-width="2"/><circle cx="-7" cy="-24" r="2" fill="#f57c00"/><rect x="-2" y="-26" width="12" height="3" rx="1.5" fill="#d6dce3"/><circle cx="-7" cy="-12" r="2" fill="#f57c00"/><rect x="-2" y="-14" width="12" height="3" rx="1.5" fill="#d6dce3"/></g>
    <g transform="translate(168,196)" class="scale" style="animation-delay:0.5s"><rect x="-14" y="-32" width="28" height="32" rx="4" fill="#fff" stroke="#f57c00" stroke-width="2"/><circle cx="-7" cy="-24" r="2" fill="#f57c00"/><rect x="-2" y="-26" width="12" height="3" rx="1.5" fill="#d6dce3"/><circle cx="-7" cy="-12" r="2" fill="#f57c00"/><rect x="-2" y="-14" width="12" height="3" rx="1.5" fill="#d6dce3"/></g>
    <g transform="translate(272,196)" class="scale" style="animation-delay:1s"><rect x="-14" y="-32" width="28" height="32" rx="4" fill="#fff" stroke="#f57c00" stroke-width="2"/><circle cx="-7" cy="-24" r="2" fill="#f57c00"/><rect x="-2" y="-26" width="12" height="3" rx="1.5" fill="#d6dce3"/><circle cx="-7" cy="-12" r="2" fill="#f57c00"/><rect x="-2" y="-14" width="12" height="3" rx="1.5" fill="#d6dce3"/></g>
    <g transform="translate(332,196)" class="scale" style="animation-delay:1.5s"><rect x="-14" y="-32" width="28" height="32" rx="4" fill="#fff" stroke="#f57c00" stroke-width="2"/><circle cx="-7" cy="-24" r="2" fill="#f57c00"/><rect x="-2" y="-26" width="12" height="3" rx="1.5" fill="#d6dce3"/><circle cx="-7" cy="-12" r="2" fill="#f57c00"/><rect x="-2" y="-14" width="12" height="3" rx="1.5" fill="#d6dce3"/></g>
  </g>

  <text x="220" y="224" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#66707d">Cloud that scales itself</text>
</svg>
