<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" role="img">

  <style>
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 5s linear infinite reverse; }
    .flow  { animation: flow 1.6s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 3.4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    .slide { animation: slide 3.2s ease-in-out infinite; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes flow    { to { stroke-dashoffset: -32; } }
    @keyframes pulse   { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes blink   { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    @keyframes slide   { 0% { transform: translateY(10px); opacity: 0; } 20%,80% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-8px); opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .spin,.spinR,.flow,.pulse,.breathe,.ping,.blink,.slide { animation: none; opacity: 1; }
    }
  </style>
  <rect x="0" y="0" width="440" height="240" fill="#f6f8fa"/>

  <text x="220" y="38" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#f57c00">NATIVE MOBILE APPS</text>

  <!-- secondary phone (iOS-style, behind) -->
  <g transform="translate(292,130)">
    <rect x="-38" y="-58" width="76" height="118" rx="14" fill="#fff" stroke="#aab3bf" stroke-width="2"/>
    <rect x="-11" y="-53" width="22" height="4" rx="2" fill="#e0e5ec"/>
    <rect x="-30" y="-42" width="60" height="14" rx="4" fill="#eef1f5"/>
    <!-- list rows -->
    <g><rect x="-30" y="-22" width="60" height="12" rx="3" fill="#f6f8fa"/><circle cx="-22" cy="-16" r="3.4" fill="#aab3bf"/><rect x="-15" y="-18" width="38" height="4" rx="2" fill="#d6dce3"/></g>
    <g><rect x="-30" y="-6" width="60" height="12" rx="3" fill="#f6f8fa"/><circle cx="-22" cy="0" r="3.4" fill="#f57c00" opacity="0.7"/><rect x="-15" y="-2" width="38" height="4" rx="2" fill="#d6dce3"/></g>
    <g><rect x="-30" y="10" width="60" height="12" rx="3" fill="#f6f8fa"/><circle cx="-22" cy="16" r="3.4" fill="#aab3bf"/><rect x="-15" y="14" width="38" height="4" rx="2" fill="#d6dce3"/></g>
    <rect x="-9" y="46" width="18" height="4" rx="2" fill="#d6dce3"/>
  </g>

  <!-- main phone (Android-style, front) -->
  <g transform="translate(158,124)">
    <rect x="-46" y="-72" width="92" height="146" rx="16" fill="#fff" stroke="#2b3440" stroke-width="2.6"/>
    <circle cx="0" cy="-63" r="2.4" fill="#d6dce3"/>
    <!-- app bar -->
    <rect x="-38" y="-54" width="76" height="20" rx="5" fill="#f57c00"/>
    <rect x="-32" y="-47" width="30" height="5" rx="2.5" fill="#fff" opacity="0.9"/>
    <circle cx="30" cy="-44" r="2.4" fill="#fff"/><circle cx="23" cy="-44" r="2.4" fill="#fff" opacity="0.7"/>
    <!-- sliding content cards (views loading) -->
    <g class="slide" style="animation-delay:0s"><rect x="-38" y="-26" width="76" height="20" rx="5" fill="#eef1f5"/><circle cx="-28" cy="-16" r="5" fill="#f57c00" opacity="0.75"/><rect x="-18" y="-19" width="46" height="4" rx="2" fill="#c7d0da"/><rect x="-18" y="-12" width="34" height="4" rx="2" fill="#d6dce3"/></g>
    <g class="slide" style="animation-delay:0.5s"><rect x="-38" y="0" width="76" height="20" rx="5" fill="#eef1f5"/><circle cx="-28" cy="10" r="5" fill="#aab3bf"/><rect x="-18" y="7" width="46" height="4" rx="2" fill="#c7d0da"/><rect x="-18" y="14" width="34" height="4" rx="2" fill="#d6dce3"/></g>
    <g class="slide" style="animation-delay:1s"><rect x="-38" y="26" width="76" height="20" rx="5" fill="#eef1f5"/><circle cx="-28" cy="36" r="5" fill="#f57c00" opacity="0.75"/><rect x="-18" y="33" width="46" height="4" rx="2" fill="#c7d0da"/><rect x="-18" y="40" width="34" height="4" rx="2" fill="#d6dce3"/></g>
    <!-- Android bottom nav -->
    <rect x="-38" y="52" width="76" height="16" rx="5" fill="#fff" stroke="#e7ebf0" stroke-width="1.2"/>
    <g class="blink"><rect x="-30" y="57" width="8" height="6" rx="1.5" fill="#f57c00"/></g>
    <circle cx="-6" cy="60" r="3" fill="#aab3bf"/>
    <path d="M14 63 l4 -6 4 6 z" fill="#aab3bf"/>
  </g>

  <!-- notification ping -->
  <g transform="translate(196,58)">
    <circle r="9" fill="none" stroke="#f57c00" stroke-width="2" class="ping"/>
    <circle r="6" fill="#f57c00"/>
    <text x="0" y="3.4" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="8" font-weight="700" fill="#fff">3</text>
  </g>

  <!-- navigation flow between screens -->
  <path class="flow" d="M206 124 H252" fill="none" stroke="#d6dce3" stroke-width="1.6" stroke-dasharray="4 5"/>
  <g opacity="0"><circle r="3.6" fill="#f57c00"/>
    <animateMotion dur="2.4s" begin="0.3s" repeatCount="indefinite" path="M206 124 H252" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.4s" begin="0.3s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>

  <!-- tap ripple on secondary phone -->
  <g transform="translate(292,146)">
    <circle r="12" fill="none" stroke="#f57c00" stroke-width="2" class="ping"/>
    <circle r="3.2" fill="#f57c00"/>
  </g>

  <text x="220" y="222" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#66707d">Native apps for Android &amp; iOS</text>
</svg>
