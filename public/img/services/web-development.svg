<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" role="img">

  <style>
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 5s linear infinite reverse; }
    .flow  { animation: flow 1.6s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 3.4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes flow    { to { stroke-dashoffset: -32; } }
    @keyframes pulse   { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes blink   { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .spin,.spinR,.flow,.pulse,.breathe,.ping,.blink { animation: none; }
    }
  </style>
  <rect x="0" y="0" width="440" height="240" fill="#f6f8fa"/>

  <text x="130" y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#f57c00">FRONTEND</text>
  <text x="352" y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#66707d">BACKEND</text>

  <!-- browser (frontend) -->
  <g>
    <rect x="40" y="60" width="180" height="124" rx="10" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <rect x="40" y="60" width="180" height="24" rx="10" fill="#eef1f5"/>
    <rect x="40" y="74" width="180" height="10" fill="#eef1f5"/>
    <circle cx="54" cy="72" r="3" fill="#f57c00"/><circle cx="64" cy="72" r="3" fill="#aab3bf"/><circle cx="74" cy="72" r="3" fill="#d6dce3"/>
    <rect x="90" y="67" width="118" height="10" rx="5" fill="#fff" stroke="#e0e5ec"/>
    <g class="breathe">
      <rect x="54" y="96"  width="152" height="26" rx="4" fill="#f57c00" opacity="0.85"/>
      <rect x="64" y="103" width="70" height="5" rx="2.5" fill="#fff" opacity="0.9"/>
      <rect x="64" y="112" width="46" height="4" rx="2" fill="#fff" opacity="0.6"/>
      <rect x="54" y="132" width="70" height="42" rx="4" fill="#eef1f5"/>
      <rect x="136" y="132" width="70" height="42" rx="4" fill="#eef1f5"/>
      <rect x="64" y="142" width="46" height="5" rx="2.5" fill="#c7d0da"/>
      <rect x="146" y="142" width="46" height="5" rx="2.5" fill="#c7d0da"/>
      <rect x="64" y="153" width="40" height="4" rx="2" fill="#d6dce3"/>
      <rect x="146" y="153" width="40" height="4" rx="2" fill="#d6dce3"/>
    </g>
  </g>

  <!-- API request / response flow -->
  <path class="flow" d="M220 108 Q 262 92 300 96" fill="none" stroke="#d6dce3" stroke-width="1.6" stroke-dasharray="4 5"/>
  <g opacity="0"><rect x="-6" y="-4" width="12" height="8" rx="2" fill="#f57c00"/>
    <animateMotion dur="2.4s" begin="0s" repeatCount="indefinite" path="M220 108 Q 262 92 300 96" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.4s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>
  <path class="flow" d="M300 150 Q 262 176 220 156" fill="none" stroke="#d6dce3" stroke-width="1.6" stroke-dasharray="4 5"/>
  <g opacity="0"><circle r="4" fill="#2b3440"/>
    <animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite" path="M300 150 Q 262 176 220 156" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.4s" begin="1.2s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>

  <!-- API gear -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 262 128" to="360 262 128" dur="6s" repeatCount="indefinite"/>
    <rect x="259.6" y="111.6" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(0 262 114)"/>
    <rect x="273.4" y="117.4" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(45 275.7 119.7)"/>
    <rect x="279.4" y="125.7" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(90 281.7 128)"/>
    <rect x="273.4" y="138.4" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(135 275.7 140.7)"/>
    <rect x="259.6" y="143.6" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(180 262 146)"/>
    <rect x="245.7" y="138.4" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(225 248 140.7)"/>
    <rect x="242.4" y="125.7" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(270 244.7 128)"/>
    <rect x="245.7" y="117.4" width="4.6" height="4.6" rx="1" fill="#f57c00" transform="rotate(315 248 119.7)"/>
    <circle cx="262" cy="128" r="13" fill="none" stroke="#f57c00" stroke-width="2.6"/>
    <circle cx="262" cy="128" r="6" fill="none" stroke="#f57c00" stroke-width="1.4" stroke-opacity="0.5"/>
  </g>

  <!-- backend: server rack + database -->
  <g transform="translate(352,92)"><g class="breathe">
    <rect x="-40" y="-24" width="80" height="18" rx="4" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <circle cx="-30" cy="-15" r="2.6" fill="#f57c00" class="blink"/><rect x="-22" y="-17" width="40" height="4" rx="2" fill="#d6dce3"/>
    <rect x="-40" y="-2" width="80" height="18" rx="4" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <circle cx="-30" cy="7" r="2.6" fill="#f57c00" class="blink" style="animation-delay:0.6s"/><rect x="-22" y="5" width="40" height="4" rx="2" fill="#d6dce3"/>
    <rect x="-40" y="20" width="80" height="18" rx="4" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <circle cx="-30" cy="29" r="2.6" fill="#f57c00" class="blink" style="animation-delay:1.1s"/><rect x="-22" y="27" width="40" height="4" rx="2" fill="#d6dce3"/>
  </g></g>

  <!-- database -->
  <g transform="translate(352,168)">
    <ellipse cx="0" cy="-16" rx="26" ry="7" fill="#fff" stroke="#f57c00" stroke-width="2"/>
    <path d="M-26 -16 v26 a26 7 0 0 0 52 0 v-26" fill="#fff" stroke="#f57c00" stroke-width="2"/>
    <path d="M-26 -4 a26 7 0 0 0 52 0" fill="none" stroke="#f57c00" stroke-width="1.4" opacity="0.5"/>
    <path d="M-26 6 a26 7 0 0 0 52 0" fill="none" stroke="#f57c00" stroke-width="1.4" opacity="0.5"/>
  </g>
  <line x1="352" y1="132" x2="352" y2="146" stroke="#d6dce3" stroke-width="1.4"/>

  <text x="220" y="222" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#66707d">Full-stack web, built to perform</text>
</svg>
