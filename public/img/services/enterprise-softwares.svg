<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" role="img">

  <style>
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 5s linear infinite reverse; }
    .flow  { animation: flow 1.6s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 3.4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes flow    { to { stroke-dashoffset: -32; } }
    @keyframes pulse   { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes blink   { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .spin,.spinR,.flow,.pulse,.breathe,.ping,.blink { animation: none; }
    }
  </style>
  <rect x="0" y="0" width="440" height="240" fill="#f6f8fa"/>

  <text x="220" y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#f57c00">UNIFIED SYSTEMS</text>

  <!-- orbit paths -->
  <g stroke="#d6dce3" stroke-width="1.2" fill="none">
    <line x1="220" y1="128" x2="96"  y2="80"/>
    <line x1="220" y1="128" x2="344" y2="80"/>
    <line x1="220" y1="128" x2="96"  y2="176"/>
    <line x1="220" y1="128" x2="344" y2="176"/>
  </g>

  <!-- central hub -->
  <g transform="translate(220,128)">
    <g><animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
      <circle r="28" fill="none" stroke="#f57c00" stroke-width="2" stroke-dasharray="40 18"/></g>
    <g class="breathe">
      <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#fff" stroke="#f57c00" stroke-width="2.4"/>
      <rect x="-10" y="-10" width="8" height="8" rx="1.5" fill="#f57c00"/>
      <rect x="2"  y="-10" width="8" height="8" rx="1.5" fill="#f57c00" opacity="0.6"/>
      <rect x="-10" y="2"  width="8" height="8" rx="1.5" fill="#f57c00" opacity="0.6"/>
      <rect x="2"  y="2"  width="8" height="8" rx="1.5" fill="#f57c00"/>
    </g>
  </g>

  <!-- module: CRM (top-left) -->
  <g transform="translate(96,80)"><g class="breathe" style="animation-delay:0s">
    <rect x="-26" y="-18" width="52" height="36" rx="7" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <circle cx="-12" cy="-2" r="5" fill="#f57c00" opacity="0.85"/><path d="M-20 12 a8 8 0 0 1 16 0" fill="#f57c00" opacity="0.85"/>
    <rect x="4" y="-8" width="16" height="4" rx="2" fill="#d6dce3"/><rect x="4" y="0" width="16" height="4" rx="2" fill="#d6dce3"/>
  </g></g>
  <!-- module: DB (top-right) -->
  <g transform="translate(344,80)"><g class="breathe" style="animation-delay:0.5s">
    <rect x="-26" y="-18" width="52" height="36" rx="7" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <ellipse cx="0" cy="-7" rx="14" ry="4.5" fill="none" stroke="#f57c00" stroke-width="2"/>
    <path d="M-14 -7 v14 a14 4.5 0 0 0 28 0 v-14" fill="none" stroke="#f57c00" stroke-width="2"/>
    <path d="M-14 0 a14 4.5 0 0 0 28 0" fill="none" stroke="#f57c00" stroke-width="1.4" opacity="0.5"/>
  </g></g>
  <!-- module: analytics (bottom-left) -->
  <g transform="translate(96,176)"><g class="breathe" style="animation-delay:1s">
    <rect x="-26" y="-18" width="52" height="36" rx="7" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <rect x="-16" y="2" width="6" height="10" rx="1.5" fill="#d6dce3"/><rect x="-6" y="-4" width="6" height="16" rx="1.5" fill="#f57c00" opacity="0.7"/><rect x="4" y="-10" width="6" height="22" rx="1.5" fill="#f57c00"/>
  </g></g>
  <!-- module: security lock (bottom-right) -->
  <g transform="translate(344,176)"><g class="breathe" style="animation-delay:1.4s">
    <rect x="-26" y="-18" width="52" height="36" rx="7" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <g class="pulse"><rect x="-8" y="-2" width="16" height="14" rx="3" fill="none" stroke="#f57c00" stroke-width="2"/>
      <path d="M-5 -2 v-4 a5 5 0 0 1 10 0 v4" fill="none" stroke="#f57c00" stroke-width="2"/>
      <circle cx="0" cy="5" r="2" fill="#f57c00"/></g>
  </g></g>

  <!-- sync particles along spokes -->
  <g opacity="0"><circle r="3.4" fill="#f57c00"/>
    <animateMotion dur="2.2s" begin="0s" repeatCount="indefinite" path="M96 80 L220 128" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.2s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>
  <g opacity="0"><circle r="3.4" fill="#f57c00"/>
    <animateMotion dur="2.2s" begin="0.7s" repeatCount="indefinite" path="M220 128 L344 80" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.2s" begin="0.7s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>
  <g opacity="0"><circle r="3.4" fill="#f57c00"/>
    <animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite" path="M96 176 L220 128" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.2s" begin="1.1s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>
  <g opacity="0"><circle r="3.4" fill="#f57c00"/>
    <animateMotion dur="2.2s" begin="1.6s" repeatCount="indefinite" path="M220 128 L344 176" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.2s" begin="1.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>

  <text x="220" y="222" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#66707d">Enterprise systems, unified</text>
</svg>
