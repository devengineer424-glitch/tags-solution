<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" role="img">

  <style>
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 5s linear infinite reverse; }
    .flow  { animation: flow 1.6s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 3.4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes flow    { to { stroke-dashoffset: -32; } }
    @keyframes pulse   { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes blink   { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .spin,.spinR,.flow,.pulse,.breathe,.ping,.blink { animation: none; }
    }
  </style>
  <rect x="0" y="0" width="440" height="240" fill="#f6f8fa"/>

  <text x="66"  y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#66707d">DATA</text>
  <text x="220" y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#f57c00">MODEL</text>
  <text x="358" y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#66707d">DECISIONS</text>

  <!-- connection lines input -> hidden -->
  <g stroke="#d6dce3" stroke-width="1.2">
    <line x1="66" y1="88" x2="150" y2="80"/><line x1="66" y1="88" x2="150" y2="120"/><line x1="66" y1="88" x2="150" y2="160"/>
    <line x1="66" y1="128" x2="150" y2="80"/><line x1="66" y1="128" x2="150" y2="120"/><line x1="66" y1="128" x2="150" y2="160"/>
    <line x1="66" y1="168" x2="150" y2="80"/><line x1="66" y1="168" x2="150" y2="120"/><line x1="66" y1="168" x2="150" y2="160"/>
  </g>
  <!-- hidden -> output -->
  <g stroke="#f57c00" stroke-opacity="0.35" stroke-width="1.2">
    <line x1="150" y1="80"  x2="358" y2="128"/><line x1="150" y1="120" x2="358" y2="128"/><line x1="150" y1="160" x2="358" y2="128"/>
  </g>

  <!-- input nodes -->
  <g fill="#aab3bf">
    <g class="blink" style="animation-delay:0s"><circle cx="66" cy="88" r="8"/></g>
    <g class="blink" style="animation-delay:0.5s"><circle cx="66" cy="128" r="8"/></g>
    <g class="blink" style="animation-delay:1s"><circle cx="66" cy="168" r="8"/></g>
  </g>
  <!-- hidden layer -->
  <g fill="#fff" stroke="#f57c00" stroke-width="2">
    <g class="pulse" style="animation-delay:0.2s"><circle cx="150" cy="80" r="9"/></g>
    <g class="pulse" style="animation-delay:0.7s"><circle cx="150" cy="120" r="9"/></g>
    <g class="pulse" style="animation-delay:1.1s"><circle cx="150" cy="160" r="9"/></g>
  </g>

  <!-- model core -->
  <g transform="translate(228,120)">
    <g><animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 0 0" to="360 0 0" dur="7s" repeatCount="indefinite"/>
      <circle r="22" fill="none" stroke="#f57c00" stroke-width="2" stroke-dasharray="34 16"/></g>
    <g><animateTransform attributeName="transform" attributeType="XML" type="rotate" from="360 0 0" to="0 0 0" dur="5s" repeatCount="indefinite"/>
      <circle r="13" fill="none" stroke="#2b3440" stroke-width="2" stroke-dasharray="20 12"/></g>
    <g class="breathe"><circle r="6" fill="#f57c00"/></g>
  </g>

  <!-- output node -->
  <g transform="translate(358,128)"><g class="breathe">
    <rect x="-20" y="-18" width="40" height="36" rx="8" fill="#fff" stroke="#f57c00" stroke-width="2"/>
    <path class="blink" d="M-9 0 l6 7 12 -14" fill="none" stroke="#f57c00" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g></g>

  <!-- data particles flowing left to right -->
  <g opacity="0"><circle r="3.2" fill="#f57c00"/>
    <animateMotion dur="2s" begin="0s" repeatCount="indefinite" path="M66 88 L150 120 L358 128" calcMode="linear"/>
    <animate attributeName="opacity" dur="2s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.1;0.85;1"/></g>
  <g opacity="0"><circle r="3.2" fill="#f57c00"/>
    <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M66 168 L150 80 L358 128" calcMode="linear"/>
    <animate attributeName="opacity" dur="2s" begin="1s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.1;0.85;1"/></g>

  <text x="220" y="222" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#66707d">Data &amp; AI that decide</text>
</svg>
