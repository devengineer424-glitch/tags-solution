<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" role="img">

  <style>
    .spin  { transform-box: fill-box; transform-origin: center; animation: spin 6s linear infinite; }
    .spinR { transform-box: fill-box; transform-origin: center; animation: spin 5s linear infinite reverse; }
    .flow  { animation: flow 1.6s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 3.4s ease-in-out infinite; }
    .ping  { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    .grow  { transform-box: fill-box; transform-origin: bottom; animation: grow 3s ease-in-out infinite; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes flow    { to { stroke-dashoffset: -32; } }
    @keyframes pulse   { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes ping    { 0% { transform: scale(.5); opacity: .6; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes blink   { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
    @keyframes grow    { 0%,100% { transform: scaleY(0.55); } 50% { transform: scaleY(1); } }
    @media (prefers-reduced-motion: reduce) {
      .spin,.spinR,.flow,.pulse,.breathe,.ping,.blink,.grow { animation: none; }
    }
  </style>
  <defs>
    <marker id="dm-arrow" markerWidth="14" markerHeight="14" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 1.5 L12 6 L2 10.5 L5 6 Z" fill="#2b3440"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="440" height="240" fill="#f6f8fa"/>

  <text x="120" y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#66707d">AUDIENCE</text>
  <text x="342" y="40" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1" fill="#f57c00">CONVERSIONS</text>

  <!-- audience nodes -->
  <g fill="#aab3bf">
    <g class="pulse" style="animation-delay:0s"><circle cx="52" cy="70" r="6"/></g>
    <g class="pulse" style="animation-delay:0.4s"><circle cx="90" cy="60" r="6"/></g>
    <g class="pulse" style="animation-delay:0.8s"><circle cx="130" cy="72" r="6"/></g>
    <g class="pulse" style="animation-delay:0.2s"><circle cx="70" cy="94" r="6"/></g>
    <g class="pulse" style="animation-delay:0.6s"><circle cx="112" cy="94" r="6"/></g>
  </g>

  <!-- funnel -->
  <g>
    <path d="M40 116 H184 L150 158 V184 L74 202 V158 Z" fill="#fff" stroke="#f57c00" stroke-width="2" stroke-linejoin="round"/>
    <path d="M40 116 H184" stroke="#f57c00" stroke-width="2"/>
    <line x1="58" y1="128" x2="166" y2="128" stroke="#f57c00" stroke-opacity="0.25" stroke-width="1.4"/>
    <line x1="74" y1="142" x2="150" y2="142" stroke="#f57c00" stroke-opacity="0.25" stroke-width="1.4"/>
  </g>
  <!-- particles falling through funnel -->
  <g opacity="0"><circle r="3.6" fill="#f57c00"/>
    <animateMotion dur="2s" begin="0s" repeatCount="indefinite" path="M90 100 L112 180" calcMode="linear"/>
    <animate attributeName="opacity" dur="2s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.15;0.7;1"/></g>
  <g opacity="0"><circle r="3.2" fill="#f57c00"/>
    <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M130 100 L112 180" calcMode="linear"/>
    <animate attributeName="opacity" dur="2s" begin="1s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.15;0.7;1"/></g>

  <!-- flow to results -->
  <path class="flow" d="M116 194 Q 210 214 262 176" fill="none" stroke="#d6dce3" stroke-width="1.6" stroke-dasharray="4 5"/>
  <g opacity="0"><circle r="4" fill="#f57c00"/>
    <animateMotion dur="2.4s" begin="0.4s" repeatCount="indefinite" path="M116 194 Q 210 214 262 176" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.4s" begin="0.4s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.12;0.8;1"/></g>

  <!-- rising bar chart -->
  <g transform="translate(266,80)">
    <rect x="0" y="0" width="120" height="96" rx="10" fill="#fff" stroke="#e7ebf0" stroke-width="1.5"/>
    <line x1="16" y1="80" x2="104" y2="80" stroke="#e0e5ec" stroke-width="1.4"/>
    <rect x="24" y="52" width="14" height="28" rx="3" fill="#e7ebf0" class="grow" style="animation-delay:0s"/>
    <rect x="46" y="40" width="14" height="40" rx="3" fill="#f57c00" opacity="0.6" class="grow" style="animation-delay:0.3s"/>
    <rect x="68" y="28" width="14" height="52" rx="3" fill="#f57c00" opacity="0.8" class="grow" style="animation-delay:0.6s"/>
    <rect x="90" y="16" width="14" height="64" rx="3" fill="#f57c00" class="grow" style="animation-delay:0.9s"/>
    <path d="M31 52 L53 42 L75 30 L102 12" fill="none" stroke="#2b3440" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#dm-arrow)"/>
  </g>

  <text x="220" y="222" text-anchor="middle" font-family="'Sora','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#66707d">Growth that compounds</text>
</svg>
